<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form Biodata</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Form Biodata Pelamar</h4>
        <a class="btn btn-secondary" th:href="${adminMode} ? @{/admin/pelamar} : @{/dashboard}">Kembali</a>
    </div>

    <form class="card shadow-sm" th:action="${formAction}" th:object="${biodata}" method="post">
        <div class="card-body">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <h6>Data Pribadi</h6>
            <div class="row g-3 mb-3">
                <div class="col-md-6"><label class="form-label">Posisi Dilamar</label><input th:field="*{posisiDilamar}" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">Nama</label><input th:field="*{nama}" class="form-control" required></div>
                <div class="col-md-6"><label class="form-label">No KTP</label><input th:field="*{noKtp}" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Tempat Lahir</label><input th:field="*{tempatLahir}" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Tanggal Lahir</label><input th:field="*{tanggalLahir}" th:value="${biodata.tanggalLahir != null ? #temporals.format(biodata.tanggalLahir, 'yyyy-MM-dd') : ''}" type="date" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Jenis Kelamin</label>
                    <select th:field="*{jenisKelamin}" class="form-select">
                        <option value="">- Pilih -</option>
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
                <div class="col-md-3"><label class="form-label">Agama</label>
                    <select th:field="*{agama}" class="form-select">
                        <option value="">- Pilih -</option>
                        <option value="Islam">Islam</option>
                        <option value="Kristen">Kristen</option>
                        <option value="Katolik">Katolik</option>
                        <option value="Hindu">Hindu</option>
                        <option value="Buddha">Buddha</option>
                        <option value="Konghucu">Konghucu</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
                <div class="col-md-3"><label class="form-label">Golongan Darah</label><input th:field="*{golonganDarah}" class="form-control"></div>
                <div class="col-md-3"><label class="form-label">Status</label>
                    <select th:field="*{status}" class="form-select">
                        <option value="">- Pilih -</option>
                        <option value="Belum Menikah">Belum Menikah</option>
                        <option value="Menikah">Menikah</option>
                        <option value="Cerai">Cerai</option>
                    </select>
                </div>
                <div class="col-md-6"><label class="form-label">Alamat KTP</label><textarea th:field="*{alamatKtp}" class="form-control"></textarea></div>
                <div class="col-md-6"><label class="form-label">Alamat Tinggal</label><textarea th:field="*{alamatTinggal}" class="form-control"></textarea></div>
                <div class="col-md-6"><label class="form-label">Email</label><input th:field="*{email}" type="email" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">No Telp</label><input th:field="*{noTelp}" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Orang terdekat yang dapat dihubungi</label><input th:field="*{orangTerdekat}" class="form-control"></div>
                <div class="col-md-6"><label class="form-label">Penghasilan diharapkan (per bulan)</label><input th:field="*{penghasilanDiharapkan}" type="number" class="form-control"></div>
                <div class="col-md-8"><label class="form-label">Skill</label><textarea th:field="*{skill}" class="form-control"></textarea></div>
                <div class="col-md-4"><label class="form-label">Bersedia ditempatkan seluruh Indonesia</label>
                    <select th:field="*{bersediaDitempatkan}" class="form-select">
                        <option th:value="${null}">- Pilih -</option>
                        <option value="true">Ya</option>
                        <option value="false">Tidak</option>
                    </select>
                </div>
            </div>

            <h6>Pendidikan Terakhir</h6>
            <div class="table-responsive mb-3">
                <table class="table table-sm table-bordered">
                    <thead><tr><th>Jenjang</th><th>Institusi</th><th>Jurusan</th><th>Tahun Lulus</th><th>IPK</th></tr></thead>
                    <tbody>
                    <tr th:each="row, stat : *{pendidikanList}">
                        <td><input th:field="*{pendidikanList[__${stat.index}__].jenjang}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pendidikanList[__${stat.index}__].institusi}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pendidikanList[__${stat.index}__].jurusan}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pendidikanList[__${stat.index}__].tahunLulus}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pendidikanList[__${stat.index}__].ipk}" class="form-control form-control-sm"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <h6>Riwayat Pelatihan</h6>
            <div class="table-responsive mb-3">
                <table class="table table-sm table-bordered">
                    <thead><tr><th>Nama Kursus/Seminar</th><th>Sertifikat</th><th>Tahun</th></tr></thead>
                    <tbody>
                    <tr th:each="row, stat : *{pelatihanList}">
                        <td><input th:field="*{pelatihanList[__${stat.index}__].namaKursus}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pelatihanList[__${stat.index}__].sertifikat}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pelatihanList[__${stat.index}__].tahun}" class="form-control form-control-sm"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <h6>Riwayat Pekerjaan</h6>
            <div class="table-responsive mb-3">
                <table class="table table-sm table-bordered">
                    <thead><tr><th>Nama Perusahaan</th><th>Posisi Terakhir</th><th>Pendapatan Terakhir</th><th>Tahun</th></tr></thead>
                    <tbody>
                    <tr th:each="row, stat : *{pekerjaanList}">
                        <td><input th:field="*{pekerjaanList[__${stat.index}__].namaPerusahaan}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pekerjaanList[__${stat.index}__].posisiTerakhir}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pekerjaanList[__${stat.index}__].pendapatanTerakhir}" class="form-control form-control-sm"></td>
                        <td><input th:field="*{pekerjaanList[__${stat.index}__].tahun}" class="form-control form-control-sm"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-end gap-2">
            <button type="submit" class="btn btn-primary">Simpan</button>
        </div>
    </form>
</div>
</body>
</html>
