<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail Pelamar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Detail Biodata Pelamar</h4>
        <a class="btn btn-secondary" th:href="@{/admin/pelamar}">Kembali</a>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-6"><strong>Nama:</strong> <span th:text="${biodata.nama}"></span></div>
                <div class="col-md-6"><strong>Posisi:</strong> <span th:text="${biodata.posisiDilamar}"></span></div>
                <div class="col-md-6"><strong>Email:</strong> <span th:text="${biodata.email}"></span></div>
                <div class="col-md-6"><strong>No Telp:</strong> <span th:text="${biodata.noTelp}"></span></div>
                <div class="col-md-12"><strong>Skill:</strong> <span th:text="${biodata.skill}"></span></div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h6>Pendidikan Terakhir</h6>
                    <ul class="small" th:if="${!#lists.isEmpty(biodata.pendidikanList)}">
                        <li th:each="p : ${biodata.pendidikanList}" th:text="${p.jenjang + ' - ' + p.institusi + ' (' + p.tahunLulus + ')'}"></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h6>Riwayat Pelatihan</h6>
                    <ul class="small" th:if="${!#lists.isEmpty(biodata.pelatihanList)}">
                        <li th:each="p : ${biodata.pelatihanList}" th:text="${p.namaKursus + ' - ' + p.tahun}"></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h6>Riwayat Pekerjaan</h6>
                    <ul class="small" th:if="${!#lists.isEmpty(biodata.pekerjaanList)}">
                        <li th:each="p : ${biodata.pekerjaanList}" th:text="${p.namaPerusahaan + ' - ' + p.posisiTerakhir + ' (' + p.tahun + ')'}"></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
