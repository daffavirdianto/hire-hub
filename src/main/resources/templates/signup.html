<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Sign Up</h4>
                    <p class="text-muted">Data pendaftaran hanya email dan password.</p>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                    <form th:action="@{/signup}" th:object="${signupForm}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input th:field="*{email}" type="email" class="form-control" required>
                            <small class="text-danger" th:errors="*{email}"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input th:field="*{password}" type="password" class="form-control" required>
                            <small class="text-danger" th:errors="*{password}"></small>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Daftar</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Sudah punya akun?
                        <a th:href="@{/login}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
