<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Data Pelamar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <span class="navbar-brand">Admin Pelamar</span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Semua Data Pelamar</h4>
    </div>

    <form class="row g-2 mb-3" method="get" th:action="@{/admin/pelamar}">
        <div class="col-md-10">
            <input class="form-control" name="search" th:value="${query}" placeholder="Cari nama / posisi / pendidikan terakhir">
        </div>
        <div class="col-md-2 d-grid">
            <button class="btn btn-primary" type="submit">Cari</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead>
            <tr>
                <th>Nama</th>
                <th>Tempat & Tanggal Lahir</th>
                <th>Posisi Dilamar</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(biodataList)}">
                <td colspan="4" class="text-center text-muted">Belum ada data.</td>
            </tr>
            <tr th:each="item : ${biodataList}">
                <td th:text="${item.nama}"></td>
                <td>
                    <span th:text="${item.tempatLahir}"></span>
                    <span th:text="${item.tanggalLahir}"></span>
                </td>
                <td th:text="${item.posisiDilamar}"></td>
                <td class="d-flex gap-2">
                    <a class="btn btn-sm btn-info" th:href="@{'/admin/pelamar/' + ${item.id}}">Detail</a>
                    <a class="btn btn-sm btn-warning" th:href="@{'/admin/pelamar/' + ${item.id} + '/edit'}">Edit</a>
                    <form th:action="@{'/admin/pelamar/' + ${item.id} + '/delete'}" method="post"
                          onsubmit="return confirm('Hapus data ini?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
