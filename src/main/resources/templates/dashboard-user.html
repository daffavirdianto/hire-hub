<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <span class="navbar-brand">Portal Pelamar</span>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container py-4">
    <div th:if="${param.saved}" class="alert alert-success">Biodata berhasil disimpan.</div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Biodata Saya</h5>
            <div th:if="${biodata == null}">
                <p class="text-muted">Anda belum mengisi biodata pelamar.</p>
                <a class="btn btn-primary" th:href="@{/biodata/form}">Isi Biodata</a>
            </div>
            <div th:if="${biodata != null}">
                <p class="mb-1"><strong>Nama:</strong> <span th:text="${biodata.nama}"></span></p>
                <p class="mb-1"><strong>Posisi Dilamar:</strong> <span th:text="${biodata.posisiDilamar}"></span></p>
                <p class="mb-3"><strong>Email:</strong> <span th:text="${biodata.email}"></span></p>
                <a class="btn btn-primary" th:href="@{/biodata/form}">Edit Biodata</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
