<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-3">Login Aplikasi Pelamar</h4>

                    <div th:if="${param.registered}" class="alert alert-success">Registrasi berhasil, silakan login.</div>
                    <div th:if="${param.error}" class="alert alert-danger">Email atau password salah.</div>
                    <div th:if="${param.logout}" class="alert alert-info">Anda sudah logout.</div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input name="username" type="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input name="password" type="password" class="form-control" required>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Belum punya akun?
                        <a th:href="@{/signup}">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
